<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon/vfra.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">

  <title>انجمن ایران آزاد</title>
</head>
<body>

  <div id="langOverlay" class="lang-overlay"></div>

  <div class="header">
    <div class="left-header">
      <div class="circle red"></div>
      <div class="circle yellow"></div>
      <div class="logo">
        <span class="logo-full">انجمن ایران آزاد</span>
        <span class="logo-short">IRNFA</span>
      </div>
    </div>
    <div class="circle green"></div>
  </div>

  <div class="container">

    <div class="box big">انجمن</div>
    <div class="box big">گفت‌وگو</div>

    <div class="column">
      <div class="box medium">تاریخ</div>
      <div class="box medium">اخبار</div>
    </div>

    <div class="column">
      <div class="box tiny language-box">
        زبان
        <div class="language-list" id="languageList">
          <a data-lang="iran">فارسی</a>
          <a data-lang="vietnam">Tiếng Việt</a>
        </div>
      </div>
      <div class="box tiny">دیسکورد</div>
      <div class="box tiny">X (توییتر سابق)</div>
      <div class="box tiny" id="redditBtn">ردیت</div>
    </div>

  </div>

  <!-- Reddit Modal -->
  <div id="redditModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h1>انجمن ایران آزاد به‌صورت یک ساب‌ردیت مستقل در ردیت وجود ندارد.</h1>
      <p>در عوض، اعضا در اینجا فعالیت می‌کنند:</p>
      <a href="https://www.reddit.com/r/NewIran/" target="_blank">
        <span dir="ltr">Iran | ایران</span>
      </a>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
