<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>انجمن ایران آزاد</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgb(255,0,255);
  color:rgb(255,255,0);
  font-family:Tahoma, Arial, sans-serif;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  font-size:28px;
  text-align:center;
}

@media(max-width:768px){
  .container{ font-size:18px; }
}
</style>
</head>

<body>
<div class="container">
  <h1>آزادی در راه است. منتظر بمانید...</h1>
  <div id="clock"></div>
</div>

<script>

const shamsiMonths = [
 "فروردین","اردیبهشت","خرداد","تیر",
 "مرداد","شهریور","مهر","آبان",
 "آذر","دی","بهمن","اسفند"
];

// Chuyển số Ba Tư -> số thường
function faToEnDigits(str){
  return str.replace(/[۰-۹]/g, d =>
    "۰۱۲۳۴۵۶۷۸۹".indexOf(d)
  );
}

function updateClock(){

  const now = new Date();

  const iranTime = new Date(
    now.toLocaleString("en-US",{ timeZone:"Asia/Tehran" })
  );

  const formatter = new Intl.DateTimeFormat("fa-IR-u-ca-persian",{
    year:"numeric",
    month:"numeric",
    day:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:false
  });

  const parts = formatter.formatToParts(iranTime);

  let year, month, day, hour, minute, second;

  parts.forEach(p=>{
    if(p.type==="year") year = p.value;
    if(p.type==="month") month = p.value;
    if(p.type==="day") day = p.value;
    if(p.type==="hour") hour = p.value;
    if(p.type==="minute") minute = p.value;
    if(p.type==="second") second = p.value;
  });

  // Chuyển month sang số thường
  const monthNumber = parseInt(faToEnDigits(month),10);

  const monthName = shamsiMonths[monthNumber-1];

  document.getElementById("clock").textContent =
    `${day} ${monthName} ${year} ${hour}:${minute}:${second} (UTC+3:30)`;
}

setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
